<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — TaskMaxxing</title>
  <script src="/static/js/script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
    }

    .page-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.9;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 20px;
    }

    .page-subtitle {
      font-size: 1.25rem;
      color: #888888;
      max-width: 600px;
    }

    .form-label {
      display: block;
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .input-field-brutal {
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: #ffffff;
      padding: 16px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .input-field-brutal:focus {
      outline: none;
      border-color: #FF3B00;
      background: rgba(255, 59, 0, 0.02);
    }

    .input-field-brutal::placeholder {
      color: #444;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FF3B00;
      color: #000000;
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      padding: 16px 32px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-decoration: none;
      width: 100%;
    }

    .btn-primary:hover {
      background: #ffffff;
    }

    .glass-panel {
      border: 1px solid #222;
      padding: 40px;
      background: #000000;
    }

    .navbar {
      border-bottom: 1px solid #222;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      color: #ffffff;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .nav-link {
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      color: #888888;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #ffffff;
    }

    .strength-bar-container {
      margin-top: 12px;
      height: 4px;
      background: #222;
      display: flex;
      overflow: hidden;
    }

    #strength-bar {
      height: 100%;
      background: #FF3B00;
      transition: width 0.3s ease;
    }
  </style>
</head>

<body class="antialiased min-h-screen flex flex-col selection:bg-[#FF3B00] selection:text-black">
  <!-- NAV -->
  <nav class="navbar">
    <a href="/" class="nav-brand">TASKMAXXING</a>
    <a href="/login" class="nav-link">LOG IN</a>
  </nav>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-6 py-20 relative z-10">
    <div class="w-full max-w-lg">

      <div class="text-center mb-12">
        <h1 class="page-title">SIGN UP</h1>
        <p class="page-subtitle mx-auto">Create an account. Let's start cooking.</p>
      </div>

      <div class="glass-panel">
        <form id="register-form" class="space-y-6" action="/register" method="post">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="form-label">FIRST NAME</label>
              <input type="text" id="first_name" name="first_name" placeholder="Ada" class="input-field-brutal"
                autocomplete="given-name" required />
            </div>
            <div>
              <label class="form-label">LAST NAME</label>
              <input type="text" id="last_name" name="last_name" placeholder="Lovelace" class="input-field-brutal"
                autocomplete="family-name" />
            </div>
          </div>

          <div>
            <label class="form-label">EMAIL ADDRESS</label>
            <input type="email" id="email" name="email" placeholder="you@domain.com" class="input-field-brutal"
              autocomplete="email" required />
          </div>

          <div>
            <label class="form-label">PASSWORD</label>
            <div class="relative">
              <input type="password" id="password" name="password" placeholder="Min. 8 characters"
                class="input-field-brutal" autocomplete="new-password" required />
              <button type="button" id="toggle-pw"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors">
                <svg id="eye-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <div class="strength-bar-container">
              <div id="strength-bar" style="width:0%"></div>
            </div>
            <p id="strength-text" class="text-sm font-bold uppercase tracking-widest mt-2 min-h-[20px] text-gray-500">
            </p>
          </div>

          <div>
            <label class="form-label">CONFIRM PASSWORD</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••"
              class="input-field-brutal" autocomplete="new-password" required />
          </div>

          <div id="register-msg" class="hidden text-red-500 font-bold uppercase border border-red-500 p-4"></div>

          <button type="submit" id="submit-btn" class="btn-primary mt-8">
            GENERATE AURA
          </button>
        </form>

        <p class="text-center text-gray-500 font-bold uppercase tracking-widest text-sm mt-12 leading-relaxed">
          By signing up, you agree to our <a href="#"
            class="text-white hover:text-[#FF3B00] transition-colors">Terms</a>. <br />No tracking, strictly secure.
        </p>
      </div>

    </div>
  </main>

  <script>
    const pwInput = document.getElementById('password');
    document.getElementById('toggle-pw').addEventListener('click', () => {
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
    });

    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      const bar = document.getElementById('strength-bar');
      const txt = document.getElementById('strength-text');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;
      const widths = ['0%', '25%', '50%', '75%', '100%'];
      const colors = ['#ef4444', '#ef4444', '#f97316', '#eab308', '#FF3B00'];
      const labels = ['', 'WEAK', 'FAIR', 'GOOD', 'STRONG'];
      bar.style.width = widths[score];
      bar.style.background = colors[score];
      txt.textContent = val.length ? labels[score] : '';
      txt.style.color = colors[score];
    });
  </script>
</body>

</html>
