<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — TaskMaxxing</title>
  <script src="/static/js/script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
    }
    
    .hero-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(4rem, 12vw, 10rem);
      line-height: 0.85;
      text-transform: uppercase;
      color: #ffffff;
    }
    
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FF3B00;
      color: #000000;
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      padding: 16px 32px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-decoration: none;
      width: 100%;
    }

    .btn-primary:hover {
      background: #ffffff;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #ffffff;
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      padding: 16px 32px;
      cursor: pointer;
      border: 2px solid #ffffff;
      transition: all 0.2s ease;
      text-decoration: none;
      width: 100%;
    }

    .btn-secondary:hover {
      background: #ffffff;
      color: #000000;
    }
  </style>
</head>

<body class="antialiased min-h-screen flex items-center justify-center selection:bg-[#FF3B00] selection:text-black">

  <!-- Error Card -->
  <div class="relative z-10 max-w-xl w-full px-8 text-center">

    <!-- Code -->
    <div class="hero-title text-[#FF3B00] mb-4">
      {{code}}
    </div>

    <!-- Message -->
    <h1 class="text-3xl font-display uppercase tracking-widest font-bold mb-4">
      {{title}}
    </h1>

    <div class="border border-[#FF3B00] text-[#FF3B00] font-bold uppercase tracking-widest px-3 py-1 inline-block mb-6 text-sm">
      [ SYSTEM EXCEPTION ]
    </div>

    <p class="text-xl text-gray-400 leading-relaxed mb-10 font-medium">
      {{message}}
    </p>

    <!-- Actions -->
    <div class="flex flex-col gap-4 max-w-sm mx-auto">
      <a href="/" class="btn-primary">
        GO TOUCH GRASS
      </a>
      <a href="/docs" class="btn-secondary">
        VIEW API DOCS
      </a>
    </div>

    <!-- Footer hint -->
    <p class="text-gray-500 font-bold uppercase tracking-widest text-xs mt-12">
      IF THIS PERSISTS, YOU HAVE A MASSIVE SKILL ISSUE.
    </p>
  </div>

</body>

</html>
