<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — TaskMaxxing</title>
  <script src="/static/js/script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
    }

    .page-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 0.9;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 20px;
    }

    .page-subtitle {
      font-size: 1.25rem;
      color: #888888;
      max-width: 600px;
    }

    .form-label {
      display: block;
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .input-field-brutal {
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: #ffffff;
      padding: 16px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .input-field-brutal:focus {
      outline: none;
      border-color: #FF3B00;
      background: rgba(255, 59, 0, 0.02);
    }

    .input-field-brutal::placeholder {
      color: #444;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FF3B00;
      color: #000000;
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      padding: 16px 32px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-decoration: none;
      width: 100%;
    }

    .btn-primary:hover {
      background: #ffffff;
    }

    .glass-panel {
      border: 1px solid #222;
      padding: 40px;
      background: #000000;
    }

    .navbar {
      border-bottom: 1px solid #222;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      color: #ffffff;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .nav-link {
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      color: #888888;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #ffffff;
    }
  </style>
</head>

<body class="antialiased min-h-screen flex flex-col selection:bg-[#FF3B00] selection:text-black">
  <!-- NAV -->
  <nav class="navbar">
    <a href="/" class="nav-brand">TASKMAXXING</a>
    <a href="/signup" class="nav-link">SIGN UP</a>
  </nav>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-6 py-20 relative z-10">
    <div class="w-full max-w-md">

      <div class="text-center mb-12">
        <h1 class="page-title">LOG IN</h1>
        <p class="page-subtitle mx-auto">Welcome back. Your backlog missed you.</p>
      </div>

      <!-- Flash messages from backend -->
      <div id="flash-container" class="mb-4"></div>

      <div class="glass-panel">
        <form action="/auth" method="get" id="login-form" class="space-y-8" novalidate>
          <div>
            <label class="form-label">EMAIL ADDRESS</label>
            <input type="email" id="email" name="email" placeholder="hello@example.com" class="input-field-brutal" autocomplete="email" required />
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="form-label mb-0">PASSWORD</label>
              <a href="/forgot-password" class="text-sm font-bold text-[#FF3B00] uppercase hover:text-white transition-colors">Forgot?</a>
            </div>
            <input type="password" id="password" name="password" placeholder="••••••••" class="input-field-brutal" autocomplete="current-password" required />
          </div>

          <div id="login-error" class="hidden bg-red-900/20 border border-red-500 text-red-500 font-bold uppercase p-4"></div>

          <button type="submit" class="btn-primary" id="submit-btn">
            LOCK IN
          </button>
        </form>

        <div class="mt-12 text-center">
          <p class="text-gray-500 font-bold uppercase tracking-widest text-sm">
            New to TaskMaxxing?
            <a href="/signup" class="text-white hover:text-[#FF3B00] transition-colors ml-2">Create account</a>
          </p>
        </div>
      </div>

    </div>
  </main>
</body>

</html>
