<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Fan Fiction — Flow Maxxing</title>
  <script src="/static/js/script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['Space Mono', 'monospace']
          },
          colors: {
            'effortel-dark-bg': '#0F1317',
            'effortel-dark-surface': '#1B2026',
            'effortel-light-bg': '#D1DCE2',
            'effortel-light-surface': '#A9BAC4',
            'effortel-accent': '#2ED2E5',
            'effortel-accent-hover': '#1BB8C8',
          },
        },
      },
    };
  </script>
  <style>
    body {
      background: var(--effortel-dark-bg);
      color: #fff;
    }

    .topbar {
      background: rgba(15, 19, 23, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
    }

    .editor-container {
      background: transparent;
      outline: none;
      resize: none;
      width: 100%;
      min-height: 50vh;
      font-size: 1.125rem;
      line-height: 1.8;
      color: #e2e8f0;
    }

    .editor-title {
      background: transparent;
      outline: none;
      width: 100%;
      color: #ffffff;
    }

    .editor-title::placeholder {
      color: #475569;
    }

    .editor-container::placeholder {
      color: #475569;
    }

    .status-indicator {
      transition: all 0.3s;
    }
  </style>
</head>

<body class="antialiased selection:bg-effortel-accent selection:text-black">

  <div class="flex h-screen overflow-hidden">
    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden relative">
      <!-- TOPBAR -->
      <header class="topbar h-16 flex items-center justify-between px-8 flex-shrink-0 relative z-20">
        <div class="flex items-center gap-4">
          <a href="/notes"
            class="text-gray-400 hover:text-white transition-colors flex items-center justify-center p-2 rounded-full hover:bg-white/5">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </a>
          <div class="w-1 h-1 rounded-full bg-gray-500 hidden md:block"></div>
          <span class="mono-tag text-[10px] text-effortel-accent bg-effortel-accent/10 px-2 py-1 rounded">LORE</span>
          <span id="save-status" class="status-indicator text-sm text-gray-500 font-mono ml-4">Saved</span>
        </div>

        <div class="flex items-center gap-4">
          <button class="text-gray-400 hover:text-red-400 transition-colors p-2 rounded-full hover:bg-red-400/10">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"></path>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <button
            class="btn-effortel btn-pill bg-effortel-accent text-effortel-dark-bg font-bold px-6 py-2.5 text-sm shadow-[0_0_20px_rgba(46,210,229,0.3)] hover:shadow-[0_0_30px_rgba(46,210,229,0.5)] transition-all">
            Share
          </button>
        </div>
      </header>

      <!-- BACKGROUND GLOW -->
      <div
        class="absolute top-1/4 right-1/4 w-[500px] h-[500px] bg-effortel-accent/5 rounded-full blur-[150px] pointer-events-none z-0">
      </div>

      <!-- SCROLL AREA -->
      <main class="flex-1 overflow-y-auto p-8 relative z-10">
        <div class="max-w-3xl mx-auto space-y-6 pt-10 pb-32">

          <!-- Title Editor -->
          <input type="text" class="editor-title text-4xl md:text-5xl font-bold tracking-tight mb-2"
            value="Corporate Fan Fiction" placeholder="Note Title...">

          <div class="flex items-center gap-3 text-sm text-gray-500 font-mono mb-8 border-b border-white/5 pb-6">
            <span>Oct 24, 2026</span>
            <span>·</span>
            <span>43 Words</span>
          </div>

          <!-- Content Editor -->
          <textarea class="editor-container" placeholder="Start your brain dump here..."
            oninput="autoSave()">Me pretending to know what the Q3 revenue metrics mean during the all-hands. Very demure, very mindful.
The cyan accent (#2ED2E5) should only be used for hover states because I said so.

If they ask me for the synergy paradigm again, I might just rage quit right on the spot. Aura conservation is key.</textarea>

        </div>
      </main>
    </div>
  </div>

  <script>
    // Mock auto-save functionality for the frontend presentation
    let saveTimeout;
    const statusEl = document.getElementById('save-status');

    function autoSave() {
      statusEl.textContent = 'Editing...';
      statusEl.classList.add('text-yellow-500');
      statusEl.classList.remove('text-gray-500', 'text-effortel-accent');

      clearTimeout(saveTimeout);

      saveTimeout = setTimeout(() => {
        statusEl.textContent = 'Saving...';
        statusEl.classList.remove('text-yellow-500');
        statusEl.classList.add('text-gray-500');

        setTimeout(() => {
          statusEl.textContent = 'Saved';
          statusEl.classList.remove('text-gray-500');
          statusEl.classList.add('text-effortel-accent');

          setTimeout(() => {
            statusEl.classList.remove('text-effortel-accent');
            statusEl.classList.add('text-gray-500');
          }, 2000);
        }, 800);
      }, 1000);
    }
  </script>
</body>

</html>
